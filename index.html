<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPRO - Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">
            <img src="assets/logo.png" alt="APPRO">
            <span>APPRO</span>
        </div>
        <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search">
    <button id="searchBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </button>
</div>

    </nav>

    <div class="categories">
        <button class="cat-btn active" data-category="all">Ҳама</button>
        <button class="cat-btn" data-category="Games">Бозиҳо</button>
        <button class="cat-btn" data-category="Apps">Барномаҳо</button>
    </div>

    <main class="app-grid" id="appGrid"></main>

    <script src="js/main.js" type="module"></script>
</body>
</html>
