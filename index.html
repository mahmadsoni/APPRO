<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPRO - Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">
            <img src="assets/logo.png" alt="APPRO">
            <span>APPRO</span>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Ҷустуҷӯ...">
            <button id="searchBtn">🔍</button>
        </div>
    </nav>

    <div class="categories">
        <button class="cat-btn active" data-category="all">Ҳама</button>
        <button class="cat-btn" data-category="Games">Бозиҳо</button>
        <button class="cat-btn" data-category="Apps">Барномаҳо</button>
    </div>

    <main class="app-grid" id="appGrid"></main>

    <script src="js/main.js" type="module"></script>
</body>
</html>
